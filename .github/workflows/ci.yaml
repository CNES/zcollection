name: CI

on:
  push:
    branches:
      - main
      - support/v1
  pull_request:
    branches:
      - main
      - support/v1

jobs:
  linux:
    name: ${{ matrix.python-version }}-posix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        python-version: ['3.14']
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # setuptools-scm needs the full history (and tags) to compute
        # the version on a clean clone.
        fetch-depth: 0

    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        create-args: |
          python=${{ matrix.python-version }}
        environment-name: ZCollection
        environment-file: conda/environment.yml

    - name: Stamp version
      shell: bash -l {0}
      run: |
        python -m setuptools_scm
        if [[ ! -e zcollection/version.py ]]; then
          echo "__version__ = '$(git describe --tags --always)'" \
            > zcollection/version.py
        fi

    - name: Run tests
      shell: bash -l {0}
      # The S3-backed tests in test_backends.py auto-skip when ``moto``
      # / ``boto3`` are unavailable; both are listed in
      # conda/environment.yml so they run here.
      run: pytest -v -ra

  win:
    name: win
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        create-args: |
          python=3.14
        environment-name: ZCollection
        environment-file: conda/environment.yml

    - name: Stamp version
      shell: bash -l {0}
      run: |
        python -m setuptools_scm
        if [[ ! -e zcollection/version.py ]]; then
          echo "__version__ = '$(git describe --tags --always)'" \
            > zcollection/version.py
        fi

    - name: Run tests
      shell: bash -l {0}
      run: pytest -v -ra
